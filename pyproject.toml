[project]
name = "acs-nativity-streamlit"
version = "0.1.0"
description = "Streamlit app that lets people interact with nativity data generated by the `acs-nativity` package."
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "acs-nativity>=0.1.1",
    "streamlit>=1.55.0",
]

[dependency-groups]
dev = [
    "ipykernel>=7.2.0",
    "ruff>=0.15.6",
]
